name: .NET Desktop Build

on:
  push:
    branches:
      - main
      - 'capa-*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build WPF app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore OverlayWidgets/OverlayWidgets.csproj

      - name: Build
        run: dotnet build OverlayWidgets/OverlayWidgets.csproj --configuration Release --no-restore
